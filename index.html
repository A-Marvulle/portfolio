<!DOCTYPE html>
<html lang="PT-BR">

<head>
    <meta name="theme-color" content="#9e2a3a">
    <meta charset="UTF-8">
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <title>Portfolio</title>
    <link href="./src/style.css" rel="stylesheet">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

</head>

<body>
    <nav
        class="fixed w-[95vw] min-w-87.5 max-w-fit shadow h-16 p-4 mx-0 mt-2 top-0 left-1/2 -translate-x-1/2 rounded-full backdrop-blur-md bg-[#333]/70 border border-white/20 z-90 group">

        <input type="checkbox" id="navbar__control"
            class="md:hidden absolute w-8 h-8 top-4 left-5 z-20 opacity-0 cursor-pointer" />

        <div
            class="flex justify-center items-center md:hidden absolute top-4 left-5 w-8 h-8 group-has-checked:hidden pointer-events-none">
            <i class="fa-solid fa-bars text-white text-2xl"></i>
        </div>

        <div
            class="hidden md:hidden absolute top-4 left-5 w-8 h-8 group-has-checked:flex group-has-checked:justify-center group-has-checked:items-center pointer-events-none">
            <i class="fa-solid fa-xmark text-white text-2xl"></i>
        </div>

        <ul class="flex flex-col md:flex-row gap-6 md:gap-8 justify-center items-center absolute md:static top-20 left-1/2 -translate-x-1/2 md:translate-x-0 w-[90%] md:w-full bg-[#333]/95 md:bg-transparent rounded-3xl py-8 md:py-0 transition-all duration-300

        opacity-0 pointer-events-none scale-95

        md:opacity-100 md:pointer-events-auto md:scale-100

        group-has-checked:opacity-100
        group-has-checked:pointer-events-auto
        group-has-checked:scale-100">

            <li>
                <a href="#home"
                    class="link_btn uppercase hover:bg-[#9e2a3a] p-3 rounded-full text-[12px] transition ease-in-out">
                    <i class="fa-solid fa-home"></i>
                    Home
                </a>
            </li>

            <li>
                <a href="#projects"
                    class="link_btn uppercase hover:bg-[#9e2a3a] p-3 rounded-full text-[12px] transition ease-in-out">
                    <i class="fa-solid fa-laptop-code"></i>
                    Projetos
                </a>
            </li>

            <li>
                <a href="#work"
                    class="link_btn uppercase hover:bg-[#9e2a3a] p-3 rounded-full text-[12px] transition ease-in-out">
                    <i class="fa-solid fa-briefcase"></i>
                    Experiência
                </a>
            </li>

                <button
                    data-modal="work"
                    class="my-3 flex h-30 w-30 flex-col items-center justify-center gap-4 rounded-sm bg-black/10 text-center text-white hover:text-[#9e2a3a]"
                >
                    <i class="fa-regular fa-building"></i>
                    <span class="block">Experiência</span>
                </button>

                <button
                    data-modal="school"
                    class="my-3 flex h-30 w-30 flex-col items-center justify-center gap-4 rounded-sm bg-black/10 text-center text-white hover:text-[#9e2a3a]"
                >
                    <i class="fa-solid fa-graduation-cap"></i>
                    <span class="block">Escolaridade</span>
                </button>

                <button
                    data-modal="projects"
                    class="my-3 flex h-30 w-30 flex-col items-center justify-center gap-4 rounded-sm bg-black/10 text-center text-white hover:text-[#9e2a3a]"
                >
                    <i class="fa-solid fa-code"></i>
                    <span class="block">Projetos</span>
                </button>

                <button
                    data-modal="contact"
                    class="my-3 flex h-30 w-30 flex-col items-center justify-center gap-4 rounded-sm bg-black/10 text-center text-white hover:text-[#9e2a3a]"
                >
                    <i class="fa-regular fa-envelope"></i>
                    <span class="block">Contato</span>
                </button>

                <desktop-manager></desktop-manager>
            </aside>

            <nav
                class="sticky bottom-0 flex w-full gap-8 border border-x-transparent border-y-white/20 bg-[#333]/70 text-[#f0f0f0] shadow backdrop-blur-md"
            >
                <button class="nav__btn lg:ms-5" title="Minhas experiências" data-modal="work">
                    <i class="fa-regular fa-building"></i>
                </button>

                <button class="nav__btn" title="Minhas experiências acadêmicas" data-modal="school">
                    <i class="fa-solid fa-graduation-cap"></i>
                </button>

                <button class="nav__btn" title="Meus Projetos" data-modal="projects">
                    <i class="fa-solid fa-code"></i>
                </button>

                <button class="nav__btn" title="Meus Contatos" data-modal="contact">
                    <i class="fa-regular fa-envelope"></i>
                </button>
            </nav>
        </main>

        <script type="module" src="/src/main.js"></script>
    </body>
</html>
