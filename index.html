<!doctype html>
<html lang="pt-BR">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <meta name="theme-color" content="#9e2a3a" />
        <link rel="icon" href="/img/favicon.ico" />
        <link rel="icon" type="image/x-icon" href="/favicon.ico" />
        <title>Portfolio</title>

        <link rel="stylesheet" href="/src/style.css" />
    </head>

    <body>
        <main class="screen relative flex w-full flex-col justify-between bg-[linear-gradient(62deg,#181719_0%,#3a3d40_100%)] lg:h-screen">
            <aside class="relative flex flex-1 flex-col items-center justify-center p-5 lg:items-end lg:justify-start">
                <div class="top-3 left-3 max-w-88 bg-[#eae672] p-5 text-center shadow-xl lg:absolute">
                    <h1 class="text-2xl">
                        Olá! Meu nome é <strong>Alfredo</strong>
                        <span class="block text-lg">Sou um desenvolvedor <strong>Front-End</strong></span>
                    </h1>
                    <div class="mt-7 flex flex-wrap items-center justify-center gap-3 text-[32px]">
                        <p>
                            <i class="fa-brands fa-js" title="JavaScript"></i>
                        </p>
                        <p>
                            <i class="fa-brands fa-typescript" title="TypeScript"></i>
                        </p>
                        <p><i class="fa-brands fa-vuejs" title="Vue"></i></p>
                        <p><i class="fa-brands fa-php" title="PHP"></i></p>
                        <p>
                            <i class="fa-brands fa-bootstrap" title="Bootstrap"></i>
                        </p>
                        <p>
                            <i class="fa-brands fa-tailwind-css" title="Tailwind CSS"></i>
                        </p>
                        <p>
                            <i class="fa-brands fa-postgresql" title="PostgreSQL"></i>
                        </p>
                        <p>
                            <i class="fa-brands fa-docker" title="Docker"></i>
                        </p>
                    </div>
                </div>

                <button
                    data-modal="work"
                    class="my-3 flex h-30 w-30 flex-col items-center justify-center gap-4 rounded-sm bg-black/10 text-center text-white hover:text-[#9e2a3a]"
                >
                    <i class="fa-regular fa-building"></i>
                    <span class="block">Experiência</span>
                </button>

                <button
                    data-modal="school"
                    class="my-3 flex h-30 w-30 flex-col items-center justify-center gap-4 rounded-sm bg-black/10 text-center text-white hover:text-[#9e2a3a]"
                >
                    <i class="fa-solid fa-graduation-cap"></i>
                    <span class="block">Escolaridade</span>
                </button>

                <button
                    data-modal="projects"
                    class="my-3 flex h-30 w-30 flex-col items-center justify-center gap-4 rounded-sm bg-black/10 text-center text-white hover:text-[#9e2a3a]"
                >
                    <i class="fa-solid fa-code"></i>
                    <span class="block">Projetos</span>
                </button>

                <button
                    data-modal="contact"
                    class="my-3 flex h-30 w-30 flex-col items-center justify-center gap-4 rounded-sm bg-black/10 text-center text-white hover:text-[#9e2a3a]"
                >
                    <i class="fa-regular fa-envelope"></i>
                    <span class="block">Contato</span>
                </button>

                <desktop-manager></desktop-manager>
            </aside>

            <nav
                class="sticky bottom-0 flex w-full gap-8 border border-x-transparent border-y-white/20 bg-[#333]/70 text-[#f0f0f0] shadow backdrop-blur-md"
            >
                <button class="nav__btn lg:ms-5" title="Minhas experiências" data-modal="work">
                    <i class="fa-regular fa-building"></i>
                </button>

                <button class="nav__btn" title="Minhas experiências acadêmicas" data-modal="school">
                    <i class="fa-solid fa-graduation-cap"></i>
                </button>

                <button class="nav__btn" title="Meus Projetos" data-modal="projects">
                    <i class="fa-solid fa-code"></i>
                </button>

                <button class="nav__btn" title="Meus Contatos" data-modal="contact">
                    <i class="fa-regular fa-envelope"></i>
                </button>
            </nav>
        </main>

        <script type="module" src="/src/main.js"></script>
    </body>
</html>
