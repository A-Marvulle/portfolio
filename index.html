<!DOCTYPE html>
<html lang="PT-BR">

<head>

    <link href="./src/style.css" rel="stylesheet">

<body>

    <main>
        <section class="py-5 text-center bg-[linear-gradient(62deg,#3a3d40_0%,#181719_100%)] text-white h-175">
            <div class="container mx-auto h-full  flex flex-col justify-around items-center">

            <div class="container mx-auto">
                <h2 class="title">Minha Trajetória Acadêmica</h2>
                <div id="education"></div>
            </div>
        </section>

    <footer class="bg-[#333] py-5">
        <section class="container mx-auto">
            <h2 class="title">Entre em contato</h2>
            <div id="infoId"></div>
        </section>
        <div class="text-center py-5">
            <a href="./public/cv-alfredo.pdf" class="button hover:cursor-pointer" title="Baixar Currículo"
